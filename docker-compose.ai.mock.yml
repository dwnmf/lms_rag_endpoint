services:
  ai-navigation-service:
    build:
      context: ./ai-navigation-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      EMBEDDING_MOCK: "true"
      ALLOW_EMBEDDING_FALLBACK: "true"
      VECTOR_WEIGHT: 0.7
      KEYWORD_WEIGHT: 0.3
      PRIORITY_WEIGHT: 0.05
      T_REDIRECT: 0.82
      T_GAP: 0.08
      T_SUGGEST: 0.32
      SUGGESTIONS_COUNT: 5
