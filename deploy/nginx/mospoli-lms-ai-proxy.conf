# Example production nginx config for same-origin LMS + AI proxy.
# Replace server_name and AI upstream before use.

upstream mospoli_ai_navigation {
    # AI service can run on Vast.ai, a VM, or another server.
    # Examples:
    # server 123.45.67.89:3001;
    # server ai-navigation.internal:3001;
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name lms.example.com;

    root /var/www/mospoli_lms/dist;
    index index.html;

    location /api/navigation-search {
        proxy_pass http://mospoli_ai_navigation/api/navigation-search;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Optional production guardrails.
        client_max_body_size 32k;
    }

    location /api/ai-health {
        proxy_pass http://mospoli_ai_navigation/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
